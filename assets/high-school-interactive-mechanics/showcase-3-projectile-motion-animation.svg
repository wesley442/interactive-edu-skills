    <rect x="0" y="76" width="1420" height="42" fill="#263244"/>
    <text x="52" y="72" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="38" font-weight="800" fill="#ffffff">平抛运动动画</text>
    <text x="1086" y="70" font-family="Georgia,serif" font-size="28" font-weight="700" fill="#bfe6df">Physics Skill</text>
    <text x="54" y="166" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="24" fill="#5c6b77">把水平匀速、竖直自由落体和合速度拆开看</text>
    
    <g transform="translate(54 210)">
      <rect width="1330" height="430" rx="26" fill="#263244"/>
      <text x="44" y="70" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="34" font-weight="800" fill="#ffffff">动态调整 v₀ 和高度 h</text>
      <text x="44" y="116" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="23" fill="#c9d7e2">拖动滑块后，飞行时间、水平位移、竖直速度与轨迹同步变化。</text>
      <rect x="44" y="158" width="688" height="220" rx="20" fill="#f5fbff"/>
      
  <g>
    <path d="M52.8 528H679.2" stroke="#263244" stroke-width="5.4"/>
    <path d="M96 204 C268.8 212.64, 441.6 299.04, 636 512.88" fill="none" stroke="#d63f64" stroke-width="8.64" stroke-linecap="round"/>
