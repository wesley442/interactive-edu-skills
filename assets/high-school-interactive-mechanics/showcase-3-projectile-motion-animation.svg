    <text x="171.60000000000002" y="184.56" font-family="Georgia,serif" font-size="30.240000000000002" font-weight="800" fill="#1f8a70">v₀</text>
    <text x="404.88" y="394.08000000000004" font-family="Georgia,serif" font-size="30.240000000000002" font-weight="800" fill="#2457c5">g</text>
  </g>
      <rect x="792" y="162" width="222" height="82" rx="20" fill="#ffffff" opacity="0.1"/>
      <text x="820" y="196" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="20" fill="#c9d7e2">飞行时间</text>
      <text x="820" y="232" font-family="Georgia,serif" font-size="30" font-weight="800" fill="#9de1d5">t = √(2h/g)</text>
      <rect x="1048" y="162" width="222" height="82" rx="20" fill="#ffffff" opacity="0.1"/>
      <text x="1076" y="196" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="20" fill="#c9d7e2">水平位移</text>
      <text x="1076" y="232" font-family="Georgia,serif" font-size="30" font-weight="800" fill="#ffd18b">x = v₀t</text>
      <rect x="792" y="278" width="478" height="82" rx="20" fill="#ffffff" opacity="0.1"/>
      <text x="820" y="312" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="20" fill="#c9d7e2">合速度</text>
      <text x="820" y="348" font-family="Georgia,serif" font-size="30" font-weight="800" fill="#ffffff">v = √(v₀² + vᵧ²)</text>
    </g>
    
  <g>
    <rect x="54" y="690" width="412" height="368" rx="26" fill="#ffffff" stroke="#dbe3ea" stroke-width="2"/>
    <text x="84" y="742" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="29" font-weight="700" fill="#1d2b3a">变量滑块</text>
    <text x="84" y="778" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="18" fill="#6d7c88">课堂演示时直接拖动</text>
    
      
  <g>
    <text x="94" y="830" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="20" font-weight="700" fill="#253244">初速度 v₀</text>
    <text x="354" y="830" font-family="Georgia,serif" font-size="22" font-weight="800" fill="#1f8a70">12m/s</text>
    <path d="M94 868H424" stroke="#d8e3eb" stroke-width="10" stroke-linecap="round"/>
    <path d="M94 868H278.8" stroke="#1f8a70" stroke-width="10" stroke-linecap="round"/>
    <circle cx="278.8" cy="868" r="18" fill="#1f8a70"/>
  </g>
      
  <g>
    <text x="94" y="938" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="20" font-weight="700" fill="#253244">高度 h</text>
    <text x="354" y="938" font-family="Georgia,serif" font-size="22" font-weight="800" fill="#2457c5">20m</text>
    <path d="M94 976H424" stroke="#d8e3eb" stroke-width="10" stroke-linecap="round"/>
    <path d="M94 976H318.4" stroke="#2457c5" stroke-width="10" stroke-linecap="round"/>
    <circle cx="318.4" cy="976" r="18" fill="#2457c5"/>
  </g>
    
  </g>
    
  <g>
    <rect x="506" y="690" width="412" height="368" rx="26" fill="#ffffff" stroke="#dbe3ea" stroke-width="2"/>
    <text x="536" y="742" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="29" font-weight="700" fill="#1d2b3a">分量分解</text>
    <text x="536" y="778" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="18" fill="#6d7c88">看清水平和竖直互不影响</text>
    
      <text x="548" y="848" font-family="Georgia,serif" font-size="32" font-weight="800" fill="#1f8a70">vₓ = v₀</text>
      <text x="548" y="918" font-family="Georgia,serif" font-size="32" font-weight="800" fill="#2457c5">vᵧ = gt</text>
      <text x="548" y="988" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="22" font-weight="800" fill="#253244">轨迹弯曲，不代表水平速度在变。</text>
    
  </g>
    
  <g>
    <rect x="958" y="690" width="380" height="368" rx="26" fill="#ffffff" stroke="#dbe3ea" stroke-width="2"/>
    <text x="988" y="742" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="29" font-weight="700" fill="#1d2b3a">易错点</text>
    <text x="988" y="778" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="18" fill="#6d7c88">把动画变成讲题节奏</text>
    
      <g><rect x="1000" y="838" width="152" height="42" rx="21" fill="#1f8a70"/><text x="1022" y="866" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#ffffff">水平速度不变</text></g>
      <g><rect x="1000" y="908" width="188" height="42" rx="21" fill="#2457c5"/><text x="1022" y="936" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#ffffff">竖直方向自由落体</text></g>
      <g><rect x="1000" y="978" width="170" height="42" rx="21" fill="#ff8b3d"/><text x="1022" y="1006" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#ffffff">合速度方向在变</text></g>
    
  </g>
  
