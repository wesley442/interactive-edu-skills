<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1280" viewBox="0 0 1600 1280">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1600" y2="1280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f7f2e8"/>
      <stop offset="0.42" stop-color="#f8fbfc"/>
      <stop offset="1" stop-color="#e4effa"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#cfdbe6" stroke-width="1" opacity="0.55"/>
    </pattern>
    <filter id="soft" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#213043" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1600" height="1280" fill="url(#paper)"/>
  <rect width="1600" height="1280" fill="url(#grid)" opacity="0.5"/>
  <circle cx="1324" cy="124" r="280" fill="#ffdca8" opacity="0.36"/>
  <circle cx="170" cy="1120" r="250" fill="#bfe6df" opacity="0.42"/>
  <g transform="translate(90 76)">
    <rect x="0" y="0" width="1420" height="1128" rx="42" fill="#fbfcfd" stroke="#dbe3ea" filter="url(#soft)"/>
    <rect x="0" y="0" width="1420" height="118" rx="42" fill="#263244"/>
    <rect x="0" y="76" width="1420" height="42" fill="#263244"/>
    <text x="52" y="72" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="38" font-weight="800" fill="#ffffff">数值同源校验</text>
    <text x="1120" y="70" font-family="Georgia,serif" font-size="28" font-weight="700" fill="#bfe6df">Geo Skill</text>
    <text x="54" y="166" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="24" fill="#5c6b77">坐标、答案和解析必须一致，避免漂亮但算错的题</text>
    
    <g transform="translate(54 210)">
      <rect width="1330" height="338" rx="26" fill="#263244"/>
      <text x="44" y="70" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="34" font-weight="800" fill="#ffffff">让 AI 先做数学自检</text>
      <text x="44" y="116" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="23" fill="#c9d7e2">生成题目后，检查条件、坐标、公式、答案是否互相匹配。</text>
      <rect x="44" y="170" width="382" height="92" rx="20" fill="#ffffff" opacity="0.1"/>
      <text x="72" y="206" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="20" fill="#c9d7e2">公式</text>
      <text x="72" y="246" font-family="Georgia,serif" font-size="31" font-weight="800" fill="#9de1d5">d = |n·AP| / |n|</text>
      <rect x="470" y="170" width="382" height="92" rx="20" fill="#ffffff" opacity="0.1"/>
      <text x="498" y="206" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="20" fill="#c9d7e2">校验状态</text>
      <text x="498" y="246" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="31" font-weight="800" fill="#ffd18b">passed</text>
      <rect x="896" y="170" width="278" height="92" rx="20" fill="#ffffff" opacity="0.1"/>
      <text x="924" y="206" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="20" fill="#c9d7e2">可用场景</text>
      <text x="924" y="246" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="31" font-weight="800" fill="#fff">备课 / 出题</text>
    </g>
    
  <g>
    <rect x="54" y="596" width="412" height="462" rx="26" fill="#ffffff" stroke="#dbe3ea" stroke-width="2"/>
    <text x="84" y="648" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="29" font-weight="700" fill="#1d2b3a">条件完整</text>
    <text x="84" y="684" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="18" fill="#6d7c88">缺少关键条件时主动补齐默认值</text>
    
      
        <rect x="94" y="734" width="322" height="48" rx="14" fill="#f2f6f8"/>
        <text x="120" y="765" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="21" font-weight="700" fill="#253244">底面边长 = 2</text>
        <rect x="94" y="806" width="322" height="48" rx="14" fill="#f2f6f8"/>
        <text x="120" y="837" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="21" font-weight="700" fill="#253244">高 = 1</text>
        <rect x="94" y="878" width="322" height="48" rx="14" fill="#f2f6f8"/>
        <text x="120" y="909" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="21" font-weight="700" fill="#253244">E 为 PC 中点</text>
        <rect x="94" y="950" width="322" height="48" rx="14" fill="#f2f6f8"/>
        <text x="120" y="981" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="21" font-weight="700" fill="#253244">目标：线面角正弦</text>
    
  </g>
    
  <g>
    <rect x="506" y="596" width="412" height="462" rx="26" fill="#ffffff" stroke="#dbe3ea" stroke-width="2"/>
    <text x="536" y="648" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="29" font-weight="700" fill="#1d2b3a">步骤可追踪</text>
    <text x="536" y="684" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="18" fill="#6d7c88">每一步都有公式和几何对象</text>
    
      <path d="M568 788H852" stroke="#dbe3ea" stroke-width="8" stroke-linecap="round"/>
      <path d="M568 788H724" stroke="#1f8a70" stroke-width="8" stroke-linecap="round"/>
      <circle cx="568" cy="788" r="18" fill="#1f8a70"/>
      <circle cx="724" cy="788" r="18" fill="#1f8a70"/>
      <circle cx="852" cy="788" r="18" fill="#cad5df"/>
      <text x="568" y="850" font-family="Georgia,serif" font-size="28" font-weight="800" fill="#253244">n = PA × PC</text>
      <text x="568" y="904" font-family="Georgia,serif" font-size="28" font-weight="800" fill="#253244">sin θ = |v · n| / |v||n|</text>
    
  </g>
    
  <g>
    <rect x="958" y="596" width="380" height="462" rx="26" fill="#ffffff" stroke="#dbe3ea" stroke-width="2"/>
    <text x="988" y="648" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="29" font-weight="700" fill="#1d2b3a">课堂友好</text>
    <text x="988" y="684" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="18" fill="#6d7c88">附带提问、易错点和变式题</text>
    
      <g><rect x="1000" y="744" width="116" height="42" rx="21" fill="#2457c5"/><text x="1022" y="772" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#ffffff">暂停提问</text></g>
      <g><rect x="1000" y="814" width="98" height="42" rx="21" fill="#d63f64"/><text x="1022" y="842" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#ffffff">易错点</text></g>
      <g><rect x="1000" y="884" width="98" height="42" rx="21" fill="#1f8a70"/><text x="1022" y="912" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#ffffff">变式题</text></g>
      <text x="1000" y="988" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="22" font-weight="800" fill="#253244">老师拿到就能讲，学生看完能复盘。</text>
    
  </g>
  
  </g>
</svg>