    <path d="M1155,544.4 L1166.2,793.6" stroke="#2457c5" stroke-width="5.6000000000000005" stroke-linecap="round"/>
    <path d="M1114.68,683.28 C1139.32,700.08 1159.48,701.2 1179.64,686.08" fill="none" stroke="#d63f64" stroke-width="5.040000000000001" stroke-linecap="round"/>
    <circle cx="1155" cy="532.0799999999999" r="8.4" fill="#2457c5"/><text x="1168.44" y="536.56" font-family="Georgia,serif" font-size="17.92" font-weight="700" fill="#253244">P</text><circle cx="1004.92" cy="752.72" r="8.4" fill="#1f8a70"/><text x="1018.36" y="757.2" font-family="Georgia,serif" font-size="17.92" font-weight="700" fill="#253244">A</text><circle cx="1295" cy="764.48" r="8.4" fill="#1f8a70"/><text x="1308.44" y="768.96" font-family="Georgia,serif" font-size="17.92" font-weight="700" fill="#253244">B</text><circle cx="1166.2" cy="813.2" r="8.4" fill="#1f8a70"/><text x="1179.64" y="817.6800000000001" font-family="Georgia,serif" font-size="17.92" font-weight="700" fill="#253244">C</text>
  </g>
      <text x="1052" y="858" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="20" fill="#263244">高亮线 BE 与平面 PAC</text>
    
  </g>
  
  </g>
</svg>