<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1280" viewBox="0 0 1600 1280">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1600" y2="1280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f7f2e8"/>
      <stop offset="0.42" stop-color="#f8fbfc"/>
      <stop offset="1" stop-color="#e4effa"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#cfdbe6" stroke-width="1" opacity="0.55"/>
    </pattern>
    <filter id="soft" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#213043" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1600" height="1280" fill="url(#paper)"/>
  <rect width="1600" height="1280" fill="url(#grid)" opacity="0.5"/>
  <circle cx="1324" cy="124" r="280" fill="#ffdca8" opacity="0.36"/>
  <circle cx="170" cy="1120" r="250" fill="#bfe6df" opacity="0.42"/>
  <g transform="translate(90 76)">
    <rect x="0" y="0" width="1420" height="1128" rx="42" fill="#fbfcfd" stroke="#dbe3ea" filter="url(#soft)"/>
    <rect x="0" y="0" width="1420" height="118" rx="42" fill="#263244"/>
    <rect x="0" y="76" width="1420" height="42" fill="#263244"/>
    <text x="52" y="72" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="38" font-weight="800" fill="#ffffff">互动几何题工坊</text>
    <text x="1120" y="70" font-family="Georgia,serif" font-size="28" font-weight="700" fill="#9de1d5">Geo Skill</text>
    <text x="54" y="166" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="24" fill="#5c6b77">一句话生成可讲、可算、可视化的几何题</text>
    
    
  <g>
    <rect x="54" y="210" width="588" height="848" rx="26" fill="#ffffff" stroke="#dbe3ea" stroke-width="2"/>
    <text x="84" y="262" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="29" font-weight="700" fill="#1d2b3a">输入需求</text>
    <text x="84" y="298" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="18" fill="#6d7c88">老师只需要给出年级、知识点或题型</text>
    
      <rect x="94" y="350" width="508" height="126" rx="22" fill="#f2f6f8" stroke="#d8e3eb"/>
      <text x="124" y="395" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="25" font-weight="700" fill="#253244">生成一道高中立体几何题</text>
      <text x="124" y="436" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="21" fill="#62717d">主题：线面角，难度中等，适合课堂讲解</text>
      <g><rect x="94" y="514" width="80" height="42" rx="21" fill="#2457c5"/><text x="116" y="542" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#ffffff">高中</text></g>
      <g><rect x="190" y="514" width="98" height="42" rx="21" fill="#1f8a70"/><text x="212" y="542" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#ffffff">线面角</text></g>
      <g><rect x="316" y="514" width="116" height="42" rx="21" fill="#ff8b3d"/><text x="338" y="542" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#ffffff">中等难度</text></g>
      
        <g transform="translate(94 626)">
          <circle cx="24" cy="24" r="24" fill="#263244"/>
          <text x="17" y="32" font-family="Georgia,serif" font-size="23" font-weight="700" fill="#fff">1</text>
          <text x="66" y="18" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="23" font-weight="700" fill="#253244">识别题型</text>
          <text x="66" y="49" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="18" fill="#667684">正四棱锥 P-ABCD，求 BE 与平面 PAC 所成角</text>
        </g>
        <g transform="translate(94 714)">
          <circle cx="24" cy="24" r="24" fill="#263244"/>
          <text x="17" y="32" font-family="Georgia,serif" font-size="23" font-weight="700" fill="#fff">2</text>
          <text x="66" y="18" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="23" font-weight="700" fill="#253244">建立坐标</text>
          <text x="66" y="49" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="18" fill="#667684">写出 P、A、B、C、E 的坐标，所有点位可校验</text>
        </g>
        <g transform="translate(94 802)">
          <circle cx="24" cy="24" r="24" fill="#d63f64"/>
          <text x="17" y="32" font-family="Georgia,serif" font-size="23" font-weight="700" fill="#fff">3</text>
          <text x="66" y="18" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="23" font-weight="700" fill="#253244">向量计算</text>
          <text x="66" y="49" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="18" fill="#667684">构造方向向量与平面法向量，得到 sin θ</text>
        </g>
        <g transform="translate(94 890)">
          <circle cx="24" cy="24" r="24" fill="#263244"/>
          <text x="17" y="32" font-family="Georgia,serif" font-size="23" font-weight="700" fill="#fff">4</text>
          <text x="66" y="18" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="23" font-weight="700" fill="#253244">生成讲解</text>
          <text x="66" y="49" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="18" fill="#667684">题目、答案、分步解析、课堂提问一次生成</text>
        </g>
    
  </g>
    
  <g>
    <rect x="692" y="210" width="646" height="848" rx="26" fill="#ffffff" stroke="#dbe3ea" stroke-width="2"/>
    <text x="722" y="262" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="29" font-weight="700" fill="#1d2b3a">生成结果预览</text>
    <text x="722" y="298" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="18" fill="#6d7c88">左边公式解析，右边 3D 几何体可旋转观察</text>
    
      <rect x="732" y="338" width="254" height="590" rx="22" fill="#f7fafb" stroke="#dbe3ea"/>
      <text x="762" y="386" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="25" font-weight="800" fill="#253244">题目</text>
      <text x="762" y="432" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="19" fill="#51606c">正四棱锥 P-ABCD 中，</text>
      <text x="762" y="464" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="19" fill="#51606c">E 为 PC 中点，求直线</text>
      <text x="762" y="496" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="19" fill="#51606c">BE 与平面 PAC 所成角。</text>
      <rect x="762" y="548" width="196" height="64" rx="14" fill="#263244"/>
      <text x="789" y="590" font-family="Georgia,serif" font-size="28" font-weight="700" fill="#9de1d5">sin θ = 1/3</text>
      <text x="762" y="674" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="22" font-weight="800" fill="#253244">分步解析</text>
      <text x="762" y="714" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="18" fill="#62717d">建系 → 坐标 → 法向量 → 夹角</text>
      <text x="762" y="750" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="18" fill="#62717d">每一步同步高亮几何对象。</text>
      <rect x="1020" y="338" width="270" height="590" rx="22" fill="#edf5fb" stroke="#dbe3ea"/>
      
  <g>
    <ellipse cx="1161.72" cy="777.36" rx="168.00000000000003" ry="32.480000000000004" fill="#dce8f6" opacity="0.7"/>
    <polygon points="1155,544.4 1020.6,751.6 1283.8,762.8" fill="#eaf3ff" stroke="#29394b" stroke-width="2.8000000000000003"/>
    <polygon points="1155,544.4 1283.8,762.8 1199.8,804.8" fill="#d7e8ff" stroke="#29394b" stroke-width="2.8000000000000003"/>
